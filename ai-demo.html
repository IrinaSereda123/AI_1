<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой AI помощник</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Стили прямо в файле, чтобы можно было открыть без внешнего CSS */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-style: italic;
        }
        input {
            padding: 15px;
            width: 70%;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            margin-right: 10px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            padding: 15px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        #answerResult {
            margin-top: 30px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 10px;
            min-height: 100px;
            text-align: left;
        }
        .loading {
            color: #667eea;
            font-style: italic;
        }
        .error {
            color: #dc3545;
        }
        .hint {
            color: #999;
            text-align: center;
        }
        .answer-text {
            line-height: 1.5;
            color: #333;
        }
        .api-note {
            margin-top: 15px;
            padding: 10px;
            background: #fff3cd;
            border-radius: 8px;
            font-size: 12px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Спроси у AI</h1>
        <p class="subtitle">Задай любой вопрос, я отвечу!</p>
        
        <input type="text" id="questionInput" placeholder="Введи свой вопрос..." value="Что такое искусственный интеллект?">
        <button id="askBtn">Спросить AI</button>
        
        <div id="answerResult">
            <p class="hint">Задай вопрос и нажми кнопку</p>
        </div>
        
        <div class="api-note">
            🔑 Вставь API-ключ в код (вместо 'ВСТАВЬ_СВОЙ_КЛЮЧ_СЮДА')<br>
            Получить бесплатно: <a href="https://console.groq.com" target="_blank">console.groq.com</a>
        </div>
    </div>

    <script>
        // --- Ждём, пока загрузится страница ---
        document.addEventListener('DOMContentLoaded', function() {
            // --- Находим элементы на странице ---
            const button = document.getElementById('askBtn');
            const questionInput = document.getElementById('questionInput');
            const answerDiv = document.getElementById('answerResult');

            // --- ОЧИСТКА ПЛЕЙСХОЛДЕРА ПРИ КЛИКЕ ---
            const defaultQuestion = "Что такое искусственный интеллект?";
            
            questionInput.addEventListener('focus', function() {
                if (questionInput.value === defaultQuestion) {
                    questionInput.value = '';
                    questionInput.style.color = '#333';
                }
            });
            
            questionInput.addEventListener('blur', function() {
                if (questionInput.value === '') {
                    questionInput.value = defaultQuestion;
                    questionInput.style.color = '#aaa';
                }
            });

            // --- ВСТАВЬ СЮДА СВОЙ API-КЛЮЧ (получи на groq.com) ---
            const apiKey = 'ВСТАВЬ_СВОЙ_КЛЮЧ_СЮДА';

            // --- Системный промпт (как AI должен себя вести) ---
            const systemPrompt = `Ты дружелюбный AI-помощник для детей. 
                                  Отвечай кратко (2-3 предложения), понятно и с юмором. 
                                  Используй простые слова. Если вопрос сложный, объясняй на примерах.`;

            // --- Функция для отправки вопроса ---
            async function askAI() {
                let question = questionInput.value.trim();

                if (question === defaultQuestion || question === '') {
                    answerDiv.innerHTML = '<p class="hint">Пожалуйста, введи свой вопрос!</p>';
                    return;
                }

                answerDiv.innerHTML = '<p class="loading">🤔 AI думает...</p>';

                try {
                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'llama-3.3-70b-versatile',
                            messages: [
                                { role: 'system', content: systemPrompt },
                                { role: 'user', content: question }
                            ],
                            temperature: 0.7,
                            max_tokens: 150
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `Ошибка ${response.status}`);
                    }

                    const data = await response.json();
                    const answer = data.choices[0].message.content;

                    answerDiv.innerHTML = `
                        <div class="answer-text">
                            <strong>🤖 AI:</strong> ${answer}
                        </div>
                        <small style="color: #999; margin-top: 10px; display: block;">
                            Ответ сгенерирован моделью Llama 3.3
                        </small>
                    `;

                } catch (error) {
                    console.error('Ошибка:', error);
                    answerDiv.innerHTML = `
                        <p class="error">❌ Ошибка: ${error.message}</p>
                        <p style="color: #666; font-size: 14px;">
                            Проверь API-ключ или подключение к интернету
                        </p>
                    `;
                }
            }

            button.addEventListener('click', askAI);
            questionInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') askAI();
            });
        });
    </script>
</body>
</html>
